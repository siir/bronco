name: CI

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  migration-edit-guard:
    name: Migration Edit Guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'staging'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block edits to already-applied Prisma migrations
        run: |
          set -euo pipefail
          git fetch origin master --depth=0 2>/dev/null || git fetch origin master
          DIFF=$(git diff --name-status origin/master...HEAD -- 'packages/db/prisma/migrations/*/migration.sql' || true)
          if [ -z "$DIFF" ]; then
            echo "No migration file changes vs origin/master."
            exit 0
          fi
          echo "Migration file changes vs origin/master:"
          echo "$DIFF"
          BAD=0
          while IFS=$'\t' read -r STATUS FILE REST; do
            [ -z "${STATUS:-}" ] && continue
            FIRST="${STATUS:0:1}"
            if [ "$FIRST" = "A" ]; then
              echo "OK   $STATUS  $FILE  (new migration)"
              continue
            fi
            NAME=$(basename "$(dirname "$FILE")")
            echo "FAIL $STATUS  $FILE"
            echo "Migration \`$NAME\` is already applied on master. Add a new migration instead of editing this one. Editing applied files breaks \`prisma migrate deploy\` checksum validation. See #447."
            BAD=1
          done <<< "$DIFF"
          if [ "$BAD" -ne 0 ]; then
            exit 1
          fi

  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bronco_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bronco_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build all packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations (test DB)
        run: pnpm --filter @bronco/db exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Unit tests
        run: pnpm test

      - name: Integration tests
        run: pnpm test:integration
